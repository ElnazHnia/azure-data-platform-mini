name: CI - Validate

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Validate structure
        run: |
          test -d "adf" || (echo "Missing adf/ folder" && exit 1)
          echo "Repo structure OK"

      - name: Validate ADF JSON files (basic)
        run: |
          python - <<'PY'
          import json, glob, sys
          files = glob.glob("adf/**/*.json", recursive=True)
          bad = 0
          for f in files:
            try:
              json.load(open(f, encoding="utf-8"))
            except Exception as e:
              print("Invalid JSON:", f, e)
              bad += 1
          print("Checked", len(files), "json files")
          sys.exit(1 if bad else 0)
          PY