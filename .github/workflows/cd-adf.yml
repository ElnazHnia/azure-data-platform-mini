name: CD - Deploy ADF

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout adf_publish (ADF deployment templates)
        uses: actions/checkout@v4
        with:
          ref: adf_publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF ARM template
        run: |
          az deployment group create \
            --resource-group "rg-azure-data-mini-dev" \
            --template-file ARMTemplateForFactory.json \
            --parameters ARMTemplateParametersForFactory.json \
            --parameters factoryName="adf-elnaz-mini-dev"